
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f2ede4; --surface:#ebe5d8; --surface2:#e4ddd0;
  --card:#ede8dd; --card2:#e6e0d4;
  --border:rgba(140,115,75,.22); --border-soft:rgba(140,115,75,.12);
  --text:#2c2416; --text-muted:#6b5540; --text-dim:#a0907a;
  --blue:#8fa8c8; --blue-glow:rgba(143,168,200,.2); --blue-light:rgba(143,168,200,.12);
  --amber:#c8a96e; --amber-glow:rgba(200,169,110,.18);
  --red:#b06060; --red-glow:rgba(176,96,96,.18);
  --purple:#9a8ab0; --purple-glow:rgba(154,138,176,.18);
  --green:#7aab88; --green-glow:rgba(122,171,136,.18);
  --pink:#b88a80; --teal:#7aaba8;
  --orange:#c07840; --canwait:#7aaba8;
  --easy:#7aab88; --med:#c8a96e; --hard:#b06060; --urgent:#c07840;
  --radius:8px; --radius-sm:5px; --transition:.18s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'DM Sans',sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 90% 60% at 15% 5%, rgba(200,175,130,.12) 0%, transparent 65%),
    radial-gradient(ellipse 70% 50% at 85% 90%, rgba(160,195,170,.08) 0%, transparent 60%),
    radial-gradient(ellipse 100% 80% at 50% 50%, rgba(180,200,220,.06) 0%, transparent 70%);
  color:var(--text);min-height:100vh;padding:0 0 80px;
}

/* ── AUTH SCREEN ── */
.auth-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;
}
.auth-box{
  background:var(--card);border:1px solid rgba(180,155,110,.18);
  border-radius:12px;padding:36px 32px;width:100%;max-width:360px;
  box-shadow:0 8px 40px rgba(100,80,50,.14);
}
.auth-logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;
  letter-spacing:-.5px;margin-bottom:6px;color:var(--text);}
.auth-logo span{color:var(--amber);}
.auth-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);margin-bottom:28px;}
.auth-tabs{display:flex;gap:0;margin-bottom:24px;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;}
.auth-tab{flex:1;padding:7px;font-family:'DM Mono',monospace;font-size:11px;
  background:transparent;border:none;cursor:pointer;color:var(--text-dim);transition:all var(--transition);}
.auth-tab.active{background:var(--amber);color:#1c1a16;font-weight:500;}
.auth-field{margin-bottom:14px;}
.auth-field label{display:block;font-family:'DM Mono',monospace;font-size:10px;
  color:var(--text-dim);margin-bottom:5px;letter-spacing:.3px;text-transform:uppercase;}
.auth-input{width:100%;background:var(--card2);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:13px;padding:8px 10px;outline:none;transition:border-color var(--transition);}
.auth-input:focus{border-color:var(--blue);}
.auth-btn{width:100%;background:linear-gradient(135deg,#8fa8c8,#c8a96e);
  border:none;color:#1c1a16;font-family:'Syne',sans-serif;font-size:13px;
  font-weight:700;padding:10px;border-radius:var(--radius-sm);cursor:pointer;
  transition:opacity var(--transition);margin-top:4px;letter-spacing:.3px;}
.auth-btn:hover{opacity:.88;}
.auth-btn:disabled{opacity:.5;cursor:not-allowed;}
.auth-err{font-family:'DM Mono',monospace;font-size:11px;color:var(--red);
  margin-top:10px;text-align:center;min-height:16px;}
.auth-ok{font-family:'DM Mono',monospace;font-size:11px;color:var(--green);
  margin-top:10px;text-align:center;min-height:16px;}

/* SYNC */
.sync-bar{background:rgba(235,229,218,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(140,115,75,.18);padding:5px 32px;}
.sync-bar-inner{max-width:980px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.sync-right{display:flex;align-items:center;gap:8px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text-dim);transition:background .3s;}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite;}
.sync-dot.synced{background:var(--green);}
.sync-dot.error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);}
.user-badge{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);
  background:var(--surface2);border:1px solid var(--border);border-radius:20px;
  padding:2px 8px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.logout-btn{background:none;border:1px solid rgba(140,115,75,.22);border-radius:20px;
  cursor:pointer;padding:2px 8px;font-size:10px;color:var(--text-dim);
  font-family:'DM Mono',monospace;transition:all var(--transition);}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

/* TIMER */
.timer-wrap{display:flex;align-items:center;gap:8px;}
.timer-display{font-family:'DM Mono',monospace;font-size:13px;color:var(--text-muted);letter-spacing:1px;min-width:58px;}
.timer-display.running{color:#7aab88;text-shadow:0 0 10px rgba(122,171,136,.3);}
.timer-btn{background:rgba(129,140,248,.08);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);font-family:'DM Mono',monospace;font-size:10px;padding:3px 8px;cursor:pointer;transition:all var(--transition);}
.timer-btn:hover{border-color:var(--amber);color:var(--text);}
.timer-btn.running{border-color:#7aab88;color:#7aab88;}
.timer-today{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);}

/* HEADER */
.header{background:rgba(238,232,220,.96);backdrop-filter:blur(16px);border-bottom:1px solid rgba(140,115,75,.18);padding:18px 32px 14px;position:sticky;top:0;z-index:100;}
.header-inner{max-width:980px;margin:0 auto;}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.header h1{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.5px;cursor:pointer;}
.header h1 span{color:#c8a96e;}
.header h1:hover span{text-decoration:underline;}
.progress-bar-wrap{margin-top:10px;display:flex;align-items:center;gap:10px;}
.progress-bar{flex:1;height:5px;background:rgba(140,115,75,.15);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#8fa8c8,#c8a96e,#7aab88);border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1);}
.progress-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);white-space:nowrap;}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;}
.legend-dot{width:6px;height:6px;border-radius:50%;}
.toolbar{display:flex;gap:5px;flex-wrap:wrap;}
.tool-btn{background:rgba(140,115,75,.08);border:1px solid rgba(140,115,75,.22);border-radius:var(--radius-sm);color:var(--text-muted);font-family:'DM Mono',monospace;font-size:10px;padding:4px 8px;cursor:pointer;transition:all var(--transition);}
.tool-btn:hover{border-color:var(--amber);color:var(--text);background:rgba(200,169,110,.1);}
.tool-btn.accent{background:rgba(200,169,110,.12);border-color:rgba(200,169,110,.4);color:var(--amber);}
.tool-btn.accent:hover{background:rgba(200,169,110,.22);}

/* MODULE TITLE EDIT */
.module-title-edit{
  display:none;align-items:center;gap:8px;margin-top:6px;
}
.module-title-edit.visible{display:flex;}
.module-title-input{
  background:var(--card2);border:1px solid var(--blue);border-radius:var(--radius-sm);
  color:var(--text);font-family:'Syne',sans-serif;font-size:16px;font-weight:700;
  padding:4px 8px;outline:none;flex:1;
}
.module-title-save{background:var(--green);border:none;color:white;border-radius:var(--radius-sm);
  padding:4px 10px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;}

/* MAIN LAYOUT */
.main{max-width:980px;margin:0 auto;padding:18px 32px 0;display:grid;grid-template-columns:1fr 290px;gap:18px;align-items:start;}
.main-left{min-width:0;}
.sidebar{display:flex;flex-direction:column;gap:14px;position:sticky;top:110px;}

/* LOADING */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40vh;gap:14px;}
.spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted);}

/* URGENT SECTION */
.priority-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
@media(max-width:640px){.priority-row{grid-template-columns:1fr;}}
.urgent-section{border:1px solid rgba(192,120,64,.3);border-radius:var(--radius);overflow:hidden;background:rgba(192,120,64,.06);box-shadow:0 2px 14px rgba(100,80,50,.1);}
.urgent-header{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:rgba(192,120,64,.1);border-bottom:1px solid rgba(192,120,64,.2);}
.urgent-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#c07840;}
.urgent-count{font-family:'DM Mono',monospace;font-size:10px;color:rgba(251,146,60,.7);}
.urgent-items{list-style:none;}
.canwait-section{border:1px solid rgba(122,171,168,.25);border-radius:var(--radius);overflow:hidden;background:rgba(122,171,168,.05);box-shadow:0 2px 14px rgba(100,80,50,.1);}
.canwait-header{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:rgba(122,171,168,.08);border-bottom:1px solid rgba(122,171,168,.18);}
.canwait-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#7aaba8;}
.canwait-count{font-family:'DM Mono',monospace;font-size:10px;color:rgba(45,212,191,.6);}
.canwait-items{list-style:none;}

/* WEEK */
.week{margin-bottom:24px;}
.week-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.week-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;}
.week-title:hover{opacity:.75;}
.week-line{flex:1;height:1px;background:var(--border);}
.week-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);}
.week-actions{display:flex;gap:4px;align-items:center;}
.week-action-btn{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:11px;
  padding:2px 5px;border-radius:3px;transition:all var(--transition);font-family:'DM Mono',monospace;}
.week-action-btn:hover{background:rgba(140,115,75,.1);color:var(--text);}
.week-action-btn.del:hover{color:var(--red);}

/* ADD WEEK/DAY */
.add-week-row{display:flex;gap:8px;align-items:center;margin-bottom:24px;
  padding:10px 12px;border:1px dashed rgba(200,169,110,.3);border-radius:var(--radius);
  background:rgba(200,169,110,.04);}
.add-week-input{flex:1;background:var(--card2);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:12px;padding:5px 8px;outline:none;transition:border-color var(--transition);}
.add-week-input:focus{border-color:var(--blue);}
.add-week-select{background:var(--card2);border:1px solid var(--border);color:var(--text-muted);
  border-radius:var(--radius-sm);font-family:'DM Mono',monospace;font-size:10px;
  padding:5px 4px;cursor:pointer;outline:none;}
.add-week-btn{background:linear-gradient(135deg,#8fa8c8,#c8a96e);border:none;cursor:pointer;
  color:#1c1a16;font-size:13px;width:26px;height:26px;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ADD DAY */
.add-day-row{display:flex;gap:6px;align-items:center;margin-top:6px;
  padding:7px 10px;border:1px dashed rgba(200,169,110,.2);border-radius:var(--radius-sm);
  background:rgba(200,169,110,.03);}
.add-day-input{flex:1;background:var(--card2);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:11px;padding:4px 7px;outline:none;transition:border-color var(--transition);}
.add-day-input:focus{border-color:var(--blue);}
.add-day-btn{background:rgba(200,169,110,.2);border:none;cursor:pointer;
  color:var(--amber);font-size:13px;width:22px;height:22px;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:'DM Mono',monospace;font-weight:700;}

/* DAY BLOCK */
.day-block{margin-bottom:10px;border:1px solid rgba(180,155,110,.14);border-radius:var(--radius);overflow:hidden;background:var(--card);box-shadow:0 2px 12px rgba(100,80,50,.12);}
.day-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--card2);border-bottom:1px solid rgba(180,155,110,.12);cursor:pointer;user-select:none;}
.day-header:hover{background:rgba(140,115,75,.1);}
.day-name{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.3px;text-transform:uppercase;cursor:pointer;}
.day-name[contenteditable="true"]{background:var(--surface2);border-radius:3px;padding:1px 5px;
  box-shadow:0 0 0 2px var(--blue);outline:none;text-transform:none;}
.day-actions{display:flex;gap:5px;align-items:center;}
.day-progress-text{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);}
.collapse-btn{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:12px;padding:2px 3px;line-height:1;transition:color var(--transition),transform var(--transition);}
.collapse-btn:hover{color:var(--text-muted);}
.day-block.collapsed .collapse-btn{transform:rotate(-90deg);}
.day-block.collapsed .items-list,.day-block.collapsed .add-item-row{display:none;}
.day-del-btn{background:none;border:none;cursor:pointer;color:transparent;font-size:13px;
  transition:color var(--transition);line-height:1;padding:1px 2px;}
.day-header:hover .day-del-btn{color:var(--text-dim);}
.day-del-btn:hover{color:var(--red)!important;}

/* ITEMS */
.items-list{list-style:none;}
.item{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid rgba(180,155,110,.07);transition:background var(--transition);position:relative;}
.item:last-child{border-bottom:none;}
.item:hover{background:rgba(140,115,75,.07);}
.item.dragging{opacity:.4;}
.item.drag-over{background:rgba(200,169,110,.1);border-top:2px solid var(--amber);}
.item.done .item-name{text-decoration:line-through;color:var(--text-dim);}
.item.done .item-badge{opacity:.4;}

/* difficulty border */
.item.diff-easy{border-left:3px solid #7aab88;}
.item.diff-med{border-left:3px solid #c8a96e;}
.item.diff-hard{border-left:3px solid #b06060;}

.drag-handle{color:var(--text-dim);cursor:grab;font-size:12px;padding:0 1px;line-height:1;}
.drag-handle:hover{color:var(--text-muted);}
.drag-handle:active{cursor:grabbing;}

.item-checkbox{width:15px;height:15px;flex-shrink:0;border-radius:3px;border:2px solid var(--border);background:transparent;cursor:pointer;transition:all var(--transition);display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;}
.item-checkbox:hover{border-color:var(--amber);}
.item.done .item-checkbox{background:linear-gradient(135deg,#7aab88,#8fa8c8);border-color:#7aab88;color:white;}

.item-badge{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;padding:1px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.badge-lecture{background:rgba(143,168,200,.15);color:#8fa8c8;border:1px solid rgba(143,168,200,.25);}
.badge-spss{background:rgba(200,169,110,.14);color:#c8a96e;border:1px solid rgba(200,169,110,.25);}
.badge-sdl{background:rgba(176,96,96,.14);color:#b06060;border:1px solid rgba(176,96,96,.25);}
.badge-field{background:rgba(154,138,176,.14);color:#9a8ab0;border:1px solid rgba(154,138,176,.25);}
.badge-exam{background:rgba(122,171,136,.14);color:#7aab88;border:1px solid rgba(122,171,136,.25);}
.badge-urgent{background:rgba(192,120,64,.16);color:#c07840;border:1px solid rgba(192,120,64,.28);}
.badge-canwait{background:rgba(122,171,168,.14);color:#7aaba8;border:1px solid rgba(122,171,168,.25);}
.badge-task{background:rgba(154,138,176,.14);color:#9a8ab0;border:1px solid rgba(154,138,176,.25);}

/* DIFF BADGE */
.diff-badge{font-family:'DM Mono',monospace;font-size:9px;padding:1px 5px;border-radius:3px;cursor:pointer;flex-shrink:0;border:1px solid transparent;transition:all var(--transition);}
.diff-badge.easy{background:rgba(122,171,136,.16);color:#7aab88;border-color:rgba(122,171,136,.3);font-weight:600;}
.diff-badge.med{background:rgba(200,169,110,.16);color:#c8a96e;border-color:rgba(200,169,110,.3);font-weight:600;}
.diff-badge.hard{background:rgba(176,96,96,.16);color:#b06060;border-color:rgba(176,96,96,.3);font-weight:600;}
.diff-badge.none{background:rgba(180,155,110,.06);color:var(--text-dim);border-color:rgba(180,155,110,.12);}

/* REVIEW COUNTER */
.review-wrap{display:flex;align-items:center;gap:3px;flex-shrink:0;}
.review-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);min-width:12px;text-align:center;}
.review-count.has-reviews{color:#c8a96e;}
.review-btn{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:11px;line-height:1;padding:1px 3px;border-radius:3px;transition:all var(--transition);}
.review-btn:hover{background:rgba(200,169,110,.12);color:#c8a96e;}

.item-name{flex:1;font-size:12.5px;color:var(--text);transition:color var(--transition);outline:none;min-width:0;}
.item-name[contenteditable="true"]{background:var(--surface2);border-radius:4px;padding:1px 5px;box-shadow:0 0 0 2px var(--blue);}
.item-del{background:none;border:none;cursor:pointer;color:transparent;font-size:14px;transition:color var(--transition);line-height:1;padding:1px;flex-shrink:0;}
.item:hover .item-del{color:var(--text-dim);}
.item-del:hover{color:var(--red)!important;}

/* ADD ROW */
.add-item-row{display:flex;gap:6px;align-items:center;padding:6px 12px;border-top:1px solid rgba(180,155,110,.1);background:rgba(140,115,75,.04);}
.add-type-select{background:var(--card2);border:1px solid var(--border);color:var(--text-muted);border-radius:var(--radius-sm);font-family:'DM Mono',monospace;font-size:10px;padding:3px 4px;cursor:pointer;outline:none;}
.add-type-select:focus{border-color:var(--blue);}
.add-input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:4px 8px;outline:none;transition:border-color var(--transition);}
.add-input::placeholder{color:var(--text-dim);}
.add-input:focus{border-color:var(--blue);}
.add-btn{background:linear-gradient(135deg,#8fa8c8,#c8a96e);border:none;cursor:pointer;color:#1c1a16;font-size:14px;width:24px;height:24px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;transition:opacity var(--transition);flex-shrink:0;}
.add-btn:hover{opacity:.82;}

/* EMPTY STATE */
.empty-state{padding:40px 20px;text-align:center;color:var(--text-dim);
  font-family:'DM Mono',monospace;font-size:12px;line-height:2;}
.empty-state strong{display:block;font-family:'Syne',sans-serif;font-size:16px;
  color:var(--text-muted);margin-bottom:8px;}

/* ── SIDEBAR WIDGETS ── */
.widget{background:var(--card);border:1px solid rgba(180,155,110,.14);border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 16px rgba(100,80,50,.1);}
.widget-header{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:var(--card2);border-bottom:1px solid rgba(180,155,110,.12);}
.widget-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--amber);}
.widget-edit-btn{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:11px;padding:2px 5px;border-radius:4px;transition:all var(--transition);}
.widget-edit-btn:hover{color:var(--text);background:var(--border);}

/* COUNTDOWN */
.cd-list{padding:4px 0;}
.cd-item-row{display:flex;align-items:center;gap:8px;padding:5px 13px;}
.cd-item-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cd-item-info{flex:1;min-width:0;}
.cd-item-name{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cd-item-days{font-family:'DM Mono',monospace;font-size:11px;white-space:nowrap;}
.cd-item-del{background:none;border:none;cursor:pointer;color:transparent;font-size:13px;transition:color var(--transition);}
.cd-item-row:hover .cd-item-del{color:var(--text-dim);}
.cd-item-del:hover{color:var(--red)!important;}
.cd-editor{padding:10px 13px;border-top:1px solid rgba(180,155,110,.1);background:rgba(140,115,75,.04);display:none;flex-direction:column;gap:7px;}
.cd-editor.open{display:flex;}
.cd-editor label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);margin-bottom:1px;display:block;}
.cd-input{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:4px 7px;outline:none;width:100%;transition:border-color var(--transition);}
.cd-input:focus{border-color:var(--blue);}
.cd-color-row{display:flex;gap:5px;flex-wrap:wrap;}
.cd-color-swatch{width:18px;height:18px;border-radius:3px;cursor:pointer;border:2px solid transparent;transition:border-color var(--transition);}
.cd-color-swatch.active{border-color:white;}
.cd-add-btn{background:linear-gradient(135deg,#8fa8c8,#c8a96e);border:none;color:#1c1a16;border-radius:var(--radius-sm);padding:5px 10px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:opacity var(--transition);}
.cd-add-btn:hover{opacity:.82;}

/* TODAY PANEL */
.today-date-label{padding:7px 13px 2px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);}
.today-tasks{list-style:none;padding:4px 0;}
.today-task{display:flex;align-items:center;gap:7px;padding:5px 13px;transition:background var(--transition);}
.today-task:hover{background:rgba(140,115,75,.07);}
.today-cb{width:14px;height:14px;flex-shrink:0;border-radius:3px;border:2px solid var(--border);background:transparent;cursor:pointer;transition:all var(--transition);display:flex;align-items:center;justify-content:center;font-size:8px;color:transparent;}
.today-cb:hover{border-color:var(--blue);}
.today-task.done .today-cb{background:var(--green);border-color:var(--green);color:white;}
.today-task.done .today-task-name{text-decoration:line-through;color:var(--text-dim);}
.today-task-name{flex:1;font-size:12px;color:var(--text);outline:none;}
.today-task-name[contenteditable="true"]{background:var(--surface2);border-radius:3px;padding:1px 4px;box-shadow:0 0 0 2px var(--blue);}
.today-task-del{background:none;border:none;cursor:pointer;color:transparent;font-size:13px;transition:color var(--transition);}
.today-task:hover .today-task-del{color:var(--text-dim);}
.today-task-del:hover{color:var(--red)!important;}
.today-add-row{display:flex;gap:5px;align-items:center;padding:6px 13px;border-top:1px solid rgba(180,155,110,.1);background:rgba(140,115,75,.04);}
.today-add-input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:4px 7px;outline:none;transition:border-color var(--transition);}
.today-add-input::placeholder{color:var(--text-dim);}
.today-add-input:focus{border-color:var(--blue);}
.today-add-btn{background:linear-gradient(135deg,#8fa8c8,#c8a96e);border:none;cursor:pointer;color:#1c1a16;font-size:13px;width:22px;height:22px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.today-add-btn:hover{opacity:.82;}
.today-empty{padding:10px 13px;font-size:11px;color:var(--text-dim);font-style:italic;text-align:center;}

/* DAILY HISTORY */
.history-list{padding:4px 0;max-height:260px;overflow-y:auto;}
.history-day{border-bottom:1px solid var(--border-soft);}
.history-day:last-child{border-bottom:none;}
.history-day-header{display:flex;align-items:center;justify-content:space-between;padding:6px 13px;cursor:pointer;user-select:none;}
.history-day-header:hover{background:rgba(140,115,75,.07);}
.history-day-name{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);}
.history-day-meta{display:flex;align-items:center;gap:8px;}
.history-day-hours{font-family:'DM Mono',monospace;font-size:10px;color:var(--green);}
.history-day-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);}
.history-day-toggle{color:var(--text-dim);font-size:11px;transition:transform var(--transition);}
.history-day.open .history-day-toggle{transform:rotate(180deg);}
.history-tasks{display:none;padding:0 13px 8px;}
.history-day.open .history-tasks{display:block;}
.history-task-item{font-size:11px;color:var(--text-dim);padding:2px 0;display:flex;align-items:center;gap:5px;}
.history-task-item::before{content:'✓';color:var(--green);font-size:9px;}
.history-empty{padding:10px 13px;font-size:11px;color:var(--text-dim);font-style:italic;text-align:center;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--card);border:1px solid #8a6a30;color:#8a6a30;border-radius:var(--radius);padding:9px 18px;font-size:12px;font-family:'DM Mono',monospace;transition:transform .3s ease;z-index:999;pointer-events:none;box-shadow:0 4px 24px rgba(140,100,40,.12);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{border-color:var(--red);color:var(--red);}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(140,115,75,.3);border-radius:99px;}

@media(max-width:720px){
  .main{grid-template-columns:1fr;}
  .sidebar{position:static;}
  .header,.main,.sync-bar{padding-left:16px;padding-right:16px;}
}

<script>
const SUPABASE_URL='https://iuzcsbytkbslhurlrfnq.supabase.co';
const SUPABASE_KEY='sb_publishable_ByID2JKtfU2Qj4s6XzkKzg_dicltyi0';
const CD_COLORS=['#2f81f7','#3fb950','#f85149','#e3b341','#a371f7','#f97316','#79c0ff','#56d364'];
const DIFF_CYCLE={none:'easy',easy:'med',med:'hard',hard:'none'};
const ITEM_TYPES=['lecture','spss','sdl','field','exam','task'];
const TYPE_CODES={lecture:'L??',spss:'SPSS',sdl:'SDL',field:'Field',exam:'EXAM',task:'Task'};

// ── AUTH STATE ────────────────────────────────────────────────
let currentUser=null; // {id, email, access_token}

async function authFetch(path,opts={}){
  const h={
    'apikey':SUPABASE_KEY,
    'Content-Type':'application/json'
  };
  if(currentUser?.access_token) h['Authorization']='Bearer '+currentUser.access_token;
  else h['Authorization']='Bearer '+SUPABASE_KEY;
  if(opts.prefer) h['Prefer']=opts.prefer;
  const controller=new AbortController();
  const timeout=setTimeout(()=>controller.abort(),8000);
  try{
    const r=await fetch(SUPABASE_URL+path,{
      method:opts.method||'GET',headers:h,
      body:opts.body,signal:controller.signal
    });
    clearTimeout(timeout);
    const t=await r.text();
    if(!r.ok) throw new Error(t);
    return t?JSON.parse(t):null;
  }catch(e){clearTimeout(timeout);throw e;}
}

async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const password=document.getElementById('loginPassword').value;
  if(!email||!password){setAuthErr('Please fill in both fields.');return;}
  setAuthErr('');setAuthOk('');
  document.getElementById('loginBtn').disabled=true;
  document.getElementById('loginBtn').textContent='Signing in…';
  try{
    const res=await authFetch('/auth/v1/token?grant_type=password',{
      method:'POST',
      body:JSON.stringify({email,password})
    });
    currentUser={id:res.user.id,email:res.user.email,access_token:res.access_token};
    localStorage.setItem('study_session',JSON.stringify(currentUser));
    showApp();
  }catch(e){
    let msg='Login failed. Check your credentials.';
    try{const j=JSON.parse(e.message);if(j.error_description)msg=j.error_description;}catch{}
    setAuthErr(msg);
  }
  document.getElementById('loginBtn').disabled=false;
  document.getElementById('loginBtn').textContent='Sign In';
}

async function doSignup(){
  const email=document.getElementById('signupEmail').value.trim();
  const password=document.getElementById('signupPassword').value;
  if(!email||!password){setAuthErr('Please fill in both fields.');return;}
  if(password.length<6){setAuthErr('Password must be at least 6 characters.');return;}
  setAuthErr('');setAuthOk('');
  document.getElementById('signupBtn').disabled=true;
  document.getElementById('signupBtn').textContent='Creating…';
  try{
    const res=await authFetch('/auth/v1/signup',{
      method:'POST',
      body:JSON.stringify({email,password})
    });
    // Auto sign-in if token returned (email confirmation off)
    if(res.access_token){
      currentUser={id:res.user.id,email:res.user.email,access_token:res.access_token};
      localStorage.setItem('study_session',JSON.stringify(currentUser));
      showApp();
    } else {
      setAuthOk('Account created! Check your email to confirm, then sign in.');
      switchTab('login');
    }
  }catch(e){
    let msg='Signup failed.';
    try{const j=JSON.parse(e.message);if(j.msg)msg=j.msg;else if(j.error_description)msg=j.error_description;}catch{}
    setAuthErr(msg);
  }
  document.getElementById('signupBtn').disabled=false;
  document.getElementById('signupBtn').textContent='Create Account';
}

function doLogout(){
  currentUser=null;
  localStorage.removeItem('study_session');
  state={title:'My Study Checklist',urgent:[],canwait:[],weeks:[]};
  document.getElementById('appWrapper').style.display='none';
  document.getElementById('authScreen').style.display='flex';
  document.getElementById('loginEmail').value='';
  document.getElementById('loginPassword').value='';
  setAuthErr('');setAuthOk('');
}

function setAuthErr(m){document.getElementById('authErr').textContent=m;}
function setAuthOk(m){document.getElementById('authOk').textContent=m;}
function switchTab(t){
  document.getElementById('loginForm').style.display=t==='login'?'block':'none';
  document.getElementById('signupForm').style.display=t==='signup'?'block':'none';
  document.getElementById('tabLogin').className='auth-tab'+(t==='login'?' active':'');
  document.getElementById('tabSignup').className='auth-tab'+(t==='signup'?' active':'');
  setAuthErr('');setAuthOk('');
}

function showApp(){
  document.getElementById('authScreen').style.display='none';
  document.getElementById('appWrapper').style.display='block';
  document.getElementById('userBadge').textContent=currentUser.email;
  initTheme();
  initTimer();
  todayTasks=loadTodayTasks();
  countdowns=loadCountdowns();
  loadFromCloud().then(()=>{
    render();renderToday();renderCountdowns();renderHistory();
  });
}

// ── STATE ─────────────────────────────────────────────────────
let state={title:'My Study Checklist',urgent:[],canwait:[],weeks:[]};
let dragSrc=null,saveTimer=null;

function uid(){return Math.random().toString(36).slice(2,9);}
function ensureIds(){
  if(!state.canwait)state.canwait=[];
  if(!state.title)state.title='My Study Checklist';
  (state.urgent||[]).forEach(i=>{if(!i.id)i.id=uid();if(!i.diff)i.diff='none';if(!i.reviews)i.reviews=0;if(i.done===undefined)i.done=false;});
  (state.canwait||[]).forEach(i=>{if(!i.id)i.id=uid();if(!i.diff)i.diff='none';if(!i.reviews)i.reviews=0;if(i.done===undefined)i.done=false;});
  (state.weeks||[]).forEach(w=>{
    if(!w.color)w.color='blue';
    w.days.forEach(d=>d.items.forEach(i=>{if(!i.id)i.id=uid();if(!i.diff)i.diff='none';if(!i.reviews)i.reviews=0;if(i.done===undefined)i.done=false;}));
  });
}

// ── SUPABASE DATA (per user) ───────────────────────────────────
function rowId(){return 'user_'+currentUser.id;}

async function loadFromCloud(){
  setSyncState('syncing','loading…');
  try{
    const rows=await authFetch(`/rest/v1/checklist?id=eq.${rowId()}&select=data`);
    if(rows&&rows.length>0&&rows[0].data){
      const d=rows[0].data;
      if(Array.isArray(d)){
        state={title:'My Study Checklist',urgent:[],canwait:[],weeks:d};
      } else {
        state=d;
        if(!state.urgent)state.urgent=[];
        if(!state.canwait)state.canwait=[];
        if(!state.weeks)state.weeks=[];
      }
    } else {
      // New user — empty state, upsert row
      state={title:'My Study Checklist',urgent:[],canwait:[],weeks:[]};
      ensureIds();
      await saveToCloud(true);
    }
    ensureIds();
    setSyncState('synced','synced');
  }catch(e){
    console.error(e);
    const lsKey='study_local_'+currentUser.id;
    try{const s=localStorage.getItem(lsKey);state=s?JSON.parse(s):{title:'My Study Checklist',urgent:[],canwait:[],weeks:[]};}
    catch{state={title:'My Study Checklist',urgent:[],canwait:[],weeks:[]};}
    ensureIds();setSyncState('error','offline – local only');
    showToast('Cloud unreachable, using local',true);
  }
}

async function saveToCloud(){
  setSyncState('syncing','saving…');
  const lsKey='study_local_'+currentUser.id;
  try{
    await authFetch(`/rest/v1/checklist?id=eq.${rowId()}`,{
      method:'PATCH',
      prefer:'return=minimal',
      body:JSON.stringify({data:state,updated_at:new Date().toISOString()})
    });
    // If PATCH returned nothing (row doesn't exist yet), do upsert
    localStorage.setItem(lsKey,JSON.stringify(state));
    setSyncState('synced','saved ✓');
    setTimeout(()=>setSyncState('synced','synced'),2000);
  }catch(e){
    // Try upsert
    try{
      await authFetch(`/rest/v1/checklist`,{
        method:'POST',
        prefer:'resolution=merge-duplicates',
        body:JSON.stringify({id:rowId(),data:state,updated_at:new Date().toISOString()})
      });
      localStorage.setItem(lsKey,JSON.stringify(state));
      setSyncState('synced','saved ✓');
      setTimeout(()=>setSyncState('synced','synced'),2000);
    }catch(e2){
      localStorage.setItem(lsKey,JSON.stringify(state));
      setSyncState('error','cloud error – saved locally');
    }
  }
}

function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>saveToCloud(),900);}
function setSyncState(s,l){
  const dot=document.getElementById('syncDot');
  const lbl=document.getElementById('syncLabel');
  if(dot)dot.className='sync-dot '+s;
  if(lbl)lbl.textContent=l;
}

// ── TIMER ─────────────────────────────────────────────────────
let timerRunning=false,timerSeconds=0,timerInterval=null;
function timerKey(){const d=new Date();return `timer_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;}
function loadTimerToday(){return parseInt(localStorage.getItem(timerKey())||'0');}
function saveTimerToday(s){localStorage.setItem(timerKey(),s);}
function initTimer(){
  timerSeconds=0;updateTimerDisplay();
  const tot=loadTimerToday();
  const lbl=document.getElementById('timerTodayLabel');
  if(lbl)lbl.textContent=tot>0?`today: ${fmtSecs(tot)}`:'';
}
function toggleTimer(){
  timerRunning=!timerRunning;
  const btn=document.getElementById('timerBtn');
  const disp=document.getElementById('timerDisplay');
  if(timerRunning){
    btn.textContent='⏸ Pause';btn.classList.add('running');disp.classList.add('running');
    timerInterval=setInterval(()=>{timerSeconds++;updateTimerDisplay();},1000);
  }else{
    btn.textContent='▶ Start';btn.classList.remove('running');disp.classList.remove('running');
    clearInterval(timerInterval);
    const prev=loadTimerToday();saveTimerToday(prev+timerSeconds);timerSeconds=0;updateTimerDisplay();
    document.getElementById('timerTodayLabel').textContent=`today: ${fmtSecs(loadTimerToday())}`;
  }
}
function resetTimer(){if(timerRunning)toggleTimer();timerSeconds=0;updateTimerDisplay();}
function updateTimerDisplay(){const d=document.getElementById('timerDisplay');if(d)d.textContent=fmtSecs(timerSeconds);}
function fmtSecs(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return `${pad(h)}:${pad(m)}:${pad(ss)}`;}
function pad(n){return String(n).padStart(2,'0');}

// ── RENDER ────────────────────────────────────────────────────
const WEEK_COLORS={blue:'var(--blue)',purple:'var(--purple)',green:'var(--green)',amber:'var(--amber)',red:'var(--red)',teal:'var(--teal)'};

function render(){
  const app=document.getElementById('app');app.innerHTML='';
  document.getElementById('moduleTitleDisplay').textContent=state.title||'My Study Checklist';

  // PRIORITY ROW
  const urg=state.urgent||[];
  const cw=state.canwait||[];
  const urgDone=urg.filter(i=>i.done).length;
  const cwDone=cw.filter(i=>i.done).length;
  const prioRow=document.createElement('div');prioRow.className='priority-row';

  // URGENT
  const urgSec=document.createElement('div');urgSec.className='urgent-section';
  urgSec.innerHTML=`<div class="urgent-header">
    <span class="urgent-title">🔥 Urgent</span>
    <span class="urgent-count">${urgDone}/${urg.length}</span>
  </div>
  <ul class="urgent-items" data-zone="urgent"></ul>
  <div class="add-item-row">
    <select class="add-type-select" id="type_urgent">${typeOptions()}</select>
    <input class="add-input" id="add_urgent" placeholder="Add…" onkeydown="if(event.key==='Enter')addZoneItem('urgent')">
    <button class="add-btn" onclick="addZoneItem('urgent')">+</button>
  </div>`;
  const urgUl=urgSec.querySelector('ul');
  urg.forEach((item,ii)=>urgUl.appendChild(makeItemEl('urgent',0,ii,item)));
  setupDragDrop(urgUl);

  // CAN WAIT
  const cwSec=document.createElement('div');cwSec.className='canwait-section';
  cwSec.innerHTML=`<div class="canwait-header">
    <span class="canwait-title">🧘 Can Wait</span>
    <span class="canwait-count">${cwDone}/${cw.length}</span>
  </div>
  <ul class="canwait-items" data-zone="canwait"></ul>
  <div class="add-item-row">
    <select class="add-type-select" id="type_canwait">${typeOptions()}</select>
    <input class="add-input" id="add_canwait" placeholder="Add…" onkeydown="if(event.key==='Enter')addZoneItem('canwait')">
    <button class="add-btn" onclick="addZoneItem('canwait')">+</button>
  </div>`;
  const cwUl=cwSec.querySelector('ul');
  cw.forEach((item,ii)=>cwUl.appendChild(makeItemEl('canwait',0,ii,item)));
  setupDragDrop(cwUl);

  prioRow.appendChild(urgSec);prioRow.appendChild(cwSec);
  app.appendChild(prioRow);

  // WEEKS
  if(!state.weeks||!state.weeks.length){
    const empty=document.createElement('div');
    empty.className='empty-state';
    empty.innerHTML=`<strong>No weeks yet</strong>Add your first week below to get started.<br>Each week can have multiple days with study items.`;
    app.appendChild(empty);
  }

  (state.weeks||[]).forEach((week,wi)=>{
    const wc=WEEK_COLORS[week.color]||'var(--blue)';
    const tot=week.days.reduce((s,d)=>s+d.items.length,0);
    const don=week.days.reduce((s,d)=>s+d.items.filter(i=>i.done).length,0);
    const weekEl=document.createElement('div');weekEl.className='week';
    weekEl.innerHTML=`<div class="week-header">
      <span class="week-title" style="color:${wc}" ondblclick="startEditWeekName(${wi},this)" title="Double-click to rename">${escHtml(week.week)}</span>
      <div class="week-line" style="background:linear-gradient(90deg,${wc}33,transparent)"></div>
      <div class="week-actions">
        <span class="week-count">${don}/${tot}</span>
        <select class="week-action-btn" onchange="changeWeekColor(${wi},this.value)" title="Color" style="font-size:11px;padding:2px 4px;">
          <option value="blue" ${week.color==='blue'?'selected':''}>🔵</option>
          <option value="purple" ${week.color==='purple'?'selected':''}>🟣</option>
          <option value="green" ${week.color==='green'?'selected':''}>🟢</option>
          <option value="amber" ${week.color==='amber'?'selected':''}>🟡</option>
          <option value="red" ${week.color==='red'?'selected':''}>🔴</option>
          <option value="teal" ${week.color==='teal'?'selected':''}>🩵</option>
        </select>
        <button class="week-action-btn del" onclick="deleteWeek(${wi})" title="Delete week">✕ week</button>
      </div>
    </div>`;

    week.days.forEach((day,di)=>{
      const dc=day.items.filter(i=>i.done).length;
      const block=document.createElement('div');block.className='day-block';
      block.innerHTML=`<div class="day-header" onclick="toggleCollapse(this.closest('.day-block'))">
        <span class="day-name" ondblclick="event.stopPropagation();startEditDayName(${wi},${di},this)" title="Double-click to rename">${escHtml(day.day)}</span>
        <div class="day-actions">
          <span class="day-progress-text">${dc}/${day.items.length}</span>
          <button class="day-del-btn" onclick="event.stopPropagation();deleteDay(${wi},${di})" title="Delete day">✕</button>
          <button class="collapse-btn" onclick="event.stopPropagation();toggleCollapse(this.closest('.day-block'))">▾</button>
        </div></div>
        <ul class="items-list" data-wi="${wi}" data-di="${di}"></ul>
        <div class="add-item-row">
          <select class="add-type-select" id="type_${wi}_${di}">${typeOptions()}</select>
          <input class="add-input" id="add_${wi}_${di}" placeholder="Add item…" onkeydown="if(event.key==='Enter')addItem(${wi},${di})">
          <button class="add-btn" onclick="addItem(${wi},${di})">+</button>
        </div>`;
      const ul=block.querySelector('.items-list');
      day.items.forEach((item,ii)=>ul.appendChild(makeItemEl(wi,di,ii,item)));
      setupDragDrop(ul);weekEl.appendChild(block);
    });

    // Add day row
    const addDayDiv=document.createElement('div');addDayDiv.className='add-day-row';
    addDayDiv.innerHTML=`<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);white-space:nowrap">+ day</span>
      <input class="add-day-input" id="addday_${wi}" placeholder="e.g. Monday · 28 April 2026"
        onkeydown="if(event.key==='Enter')addDay(${wi})">
      <button class="add-day-btn" onclick="addDay(${wi})">+</button>`;
    weekEl.appendChild(addDayDiv);
    app.appendChild(weekEl);
  });

  // Add week row
  const addWeekDiv=document.createElement('div');addWeekDiv.className='add-week-row';
  addWeekDiv.innerHTML=`<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);white-space:nowrap">+ week</span>
    <input class="add-week-input" id="addWeekInput" placeholder="e.g. Week 1 – Anatomy" onkeydown="if(event.key==='Enter')addWeek()">
    <select class="add-week-select" id="addWeekColor">
      <option value="blue">🔵 Blue</option>
      <option value="purple">🟣 Purple</option>
      <option value="green">🟢 Green</option>
      <option value="amber">🟡 Amber</option>
      <option value="red">🔴 Red</option>
      <option value="teal">🩵 Teal</option>
    </select>
    <button class="add-week-btn" onclick="addWeek()">+</button>`;
  app.appendChild(addWeekDiv);

  updateProgress();
}

function typeOptions(){
  return ITEM_TYPES.map(t=>`<option value="${t}">${t.charAt(0).toUpperCase()+t.slice(1)}</option>`).join('');
}

// ── WEEK / DAY MANAGEMENT ─────────────────────────────────────
function addWeek(){
  const input=document.getElementById('addWeekInput');
  const colorEl=document.getElementById('addWeekColor');
  const name=input.value.trim();
  if(!name){input.focus();return;}
  state.weeks.push({week:name,color:colorEl.value,days:[]});
  input.value='';scheduleSave();render();
}

function deleteWeek(wi){
  if(!confirm(`Delete week "${state.weeks[wi].week}" and all its days?`))return;
  state.weeks.splice(wi,1);scheduleSave();render();
}

function addDay(wi){
  const input=document.getElementById(`addday_${wi}`);
  const name=input.value.trim();
  if(!name){input.focus();return;}
  state.weeks[wi].days.push({day:name,items:[]});
  input.value='';scheduleSave();render();
}

function deleteDay(wi,di){
  const day=state.weeks[wi].days[di];
  if(day.items.length>0&&!confirm(`Delete "${day.day}" and its ${day.items.length} item(s)?`))return;
  state.weeks[wi].days.splice(di,1);scheduleSave();render();
}

function changeWeekColor(wi,color){
  state.weeks[wi].color=color;scheduleSave();render();
}

// Inline rename — week
function startEditWeekName(wi,el){
  el.contentEditable='true';el.focus();
  el.dataset.orig=el.textContent;
  const r=document.createRange();r.selectNodeContents(el);r.collapse(false);
  window.getSelection().removeAllRanges();window.getSelection().addRange(r);
  el.onblur=()=>endEditWeekName(wi,el);
  el.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();el.blur();}if(e.key==='Escape'){el.textContent=el.dataset.orig;el.blur();}};
}
function endEditWeekName(wi,el){
  el.contentEditable='false';
  const n=el.textContent.trim();
  if(n){state.weeks[wi].week=n;scheduleSave();}
  else el.textContent=state.weeks[wi].week;
}

// Inline rename — day
function startEditDayName(wi,di,el){
  el.contentEditable='true';el.focus();
  el.dataset.orig=el.textContent;
  const r=document.createRange();r.selectNodeContents(el);r.collapse(false);
  window.getSelection().removeAllRanges();window.getSelection().addRange(r);
  el.onblur=()=>endEditDayName(wi,di,el);
  el.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();el.blur();}if(e.key==='Escape'){el.textContent=el.dataset.orig;el.blur();}};
}
function endEditDayName(wi,di,el){
  el.contentEditable='false';
  const n=el.textContent.trim();
  if(n){state.weeks[wi].days[di].day=n;scheduleSave();}
  else el.textContent=state.weeks[wi].days[di].day;
}

// ── ITEM ELEMENT ──────────────────────────────────────────────
function makeItemEl(wi,di,ii,item){
  const zone=wi==='urgent'||wi==='canwait'?wi:null;
  const li=document.createElement('li');
  const diff=item.diff||'none';
  li.className='item'+(item.done?' done':'')+(diff!=='none'?' diff-'+diff:'');
  li.dataset.wi=wi;li.dataset.di=di;li.dataset.ii=ii;li.draggable=true;

  const diffLabel={none:'·',easy:'Easy',med:'Med',hard:'Hard'}[diff];
  const diffClass=diff==='none'?'none':diff;
  const reviews=item.reviews||0;
  const badgeType=zone?zone:item.type;

  // Build move menu options — for week items show weeks, for zone items don't show that zone
  let moveMenuItems='';
  if(wi!=='urgent') moveMenuItems+=`<div class="move-menu-item" onclick="moveItem('${wi}',${di},${ii},'urgent')">🔥 Urgent</div>`;
  if(wi!=='canwait') moveMenuItems+=`<div class="move-menu-item" onclick="moveItem('${wi}',${di},${ii},'canwait')">🧘 Can Wait</div>`;
  // Week targets
  (state.weeks||[]).forEach((wk,twi)=>{
    if(String(twi)!==String(wi)||di!==0){
      wk.days.forEach((d,tdi)=>{
        moveMenuItems+=`<div class="move-menu-item" onclick="moveItem('${wi}',${di},${ii},'week',${twi},${tdi})">${escHtml(wk.week.split('–')[0].trim())} › ${escHtml(d.day.split('·')[0].trim()||d.day)}</div>`;
      });
    }
  });

  li.innerHTML=`<span class="drag-handle">⠿</span>
    <div class="item-checkbox" onclick="toggleDone('${wi}',${di},${ii})">✓</div>
    <span class="item-badge badge-${escHtml(badgeType)}">${escHtml(item.code)}</span>
    <span class="diff-badge ${diffClass}" onclick="cycleDiff('${wi}',${di},${ii})" title="Click to change difficulty">${diffLabel}</span>
    <span class="item-name" contenteditable="false"
      ondblclick="startEdit(this,'${wi}',${di},${ii})"
      onblur="endEdit(this,'${wi}',${di},${ii})"
      onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
      >${escHtml(item.name)}</span>
    <div class="review-wrap">
      <span class="review-count ${reviews>0?'has-reviews':''}" title="Times reviewed">${reviews>0?reviews:''}</span>
      <button class="review-btn" onclick="incReview('${wi}',${di},${ii})" title="Mark as reviewed">+1</button>
    </div>
    <button class="move-btn" onclick="toggleMoveMenu(event,'${wi}',${di},${ii})" title="Move to section">⇄</button>
    <div class="move-menu" id="mm_${wi}_${di}_${ii}">
      <div class="move-menu-title">Move to…</div>
      ${moveMenuItems}
    </div>
    <button class="item-del" onclick="deleteItem('${wi}',${di},${ii})">×</button>`;

  li.addEventListener('dragstart',e=>{dragSrc={wi:li.dataset.wi,di:+li.dataset.di,ii:+li.dataset.ii};li.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
  li.addEventListener('dragend',()=>{li.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));});
  return li;
}

function setupDragDrop(ul){
  ul.addEventListener('dragover',e=>{e.preventDefault();const t=e.target.closest('.item');if(!t||!dragSrc)return;document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));t.classList.add('drag-over');});
  ul.addEventListener('drop',e=>{
    e.preventDefault();const t=e.target.closest('.item');if(!t||!dragSrc)return;t.classList.remove('drag-over');
    const dWi=t.dataset.wi,dDi=+t.dataset.di,dIi=+t.dataset.ii;
    if(dragSrc.wi===dWi&&dragSrc.di===dDi&&dragSrc.ii===dIi)return;
    const srcArr=dragSrc.wi==='urgent'?state.urgent:dragSrc.wi==='canwait'?state.canwait:state.weeks[+dragSrc.wi].days[dragSrc.di].items;
    const[moved]=srcArr.splice(dragSrc.ii,1);
    const dstArr=dWi==='urgent'?state.urgent:dWi==='canwait'?state.canwait:state.weeks[+dWi].days[dDi].items;
    dstArr.splice(dIi,0,moved);
    scheduleSave();render();
  });
}

function getItem(wi,di,ii){return wi==='urgent'?state.urgent[ii]:wi==='canwait'?state.canwait[ii]:state.weeks[+wi].days[di].items[ii];}
function getItems(wi,di){return wi==='urgent'?state.urgent:wi==='canwait'?state.canwait:state.weeks[+wi].days[di].items;}

function toggleDone(wi,di,ii){
  const item=getItem(wi,di,ii);item.done=!item.done;
  const li=document.querySelector(`.item[data-wi="${wi}"][data-di="${di}"][data-ii="${ii}"]`);
  if(li)li.classList.toggle('done',item.done);
  if(wi!=='urgent'&&wi!=='canwait'){
    const d=state.weeks[+wi].days[di];
    const ul=document.querySelector(`ul[data-wi="${wi}"][data-di="${di}"]`);
    if(ul)ul.closest('.day-block').querySelector('.day-progress-text').textContent=`${d.items.filter(i=>i.done).length}/${d.items.length}`;
  }
  if(item.done)showToast('✓ Done!');
  updateProgress();scheduleSave();
}

function cycleDiff(wi,di,ii){
  const item=getItem(wi,di,ii);
  item.diff=DIFF_CYCLE[item.diff||'none']||'none';
  scheduleSave();render();
}

function incReview(wi,di,ii){
  const item=getItem(wi,di,ii);
  item.reviews=(item.reviews||0)+1;
  scheduleSave();render();
}

function deleteItem(wi,di,ii){
  if(wi==='urgent')state.urgent.splice(ii,1);
  else if(wi==='canwait')state.canwait.splice(ii,1);
  else state.weeks[+wi].days[di].items.splice(ii,1);
  scheduleSave();render();
}

function toggleMoveMenu(e,wi,di,ii){
  e.stopPropagation();
  const id=`mm_${wi}_${di}_${ii}`;
  document.querySelectorAll('.move-menu.open').forEach(m=>{if(m.id!==id)m.classList.remove('open');});
  document.getElementById(id)?.classList.toggle('open');
}

function moveItem(wi,di,ii,dest,destWi,destDi){
  const item=getItem(wi,di,ii);
  // remove from source
  if(wi==='urgent')state.urgent.splice(ii,1);
  else if(wi==='canwait')state.canwait.splice(ii,1);
  else state.weeks[+wi].days[di].items.splice(ii,1);
  // add to destination
  if(dest==='urgent'){if(!state.urgent)state.urgent=[];state.urgent.push(item);}
  else if(dest==='canwait'){if(!state.canwait)state.canwait=[];state.canwait.push(item);}
  else if(dest==='week'){state.weeks[destWi].days[destDi].items.push(item);}
  document.querySelectorAll('.move-menu.open').forEach(m=>m.classList.remove('open'));
  scheduleSave();render();
  showToast('Moved!');
}

function addZoneItem(zone){
  const input=document.getElementById('add_'+zone),typeEl=document.getElementById('type_'+zone);
  const name=input.value.trim();if(!name){input.focus();return;}
  if(!state[zone])state[zone]=[];
  state[zone].push({id:uid(),type:typeEl.value,code:TYPE_CODES[typeEl.value]||typeEl.value,name,done:false,diff:'none',reviews:0});
  input.value='';scheduleSave();render();
}

function addItem(wi,di){
  const input=document.getElementById(`add_${wi}_${di}`),typeEl=document.getElementById(`type_${wi}_${di}`);
  const name=input.value.trim();if(!name){input.focus();return;}
  state.weeks[wi].days[di].items.push({id:uid(),type:typeEl.value,code:TYPE_CODES[typeEl.value]||typeEl.value,name,done:false,diff:'none',reviews:0});
  input.value='';scheduleSave();render();
}

function startEdit(el,wi,di,ii){el.contentEditable='true';el.focus();const r=document.createRange();r.selectNodeContents(el);r.collapse(false);window.getSelection().removeAllRanges();window.getSelection().addRange(r);}
function endEdit(el,wi,di,ii){el.contentEditable='false';const n=el.textContent.trim();if(n){getItem(wi,di,ii).name=n;scheduleSave();}else el.textContent=getItem(wi,di,ii).name;}
function toggleCollapse(b){b.classList.toggle('collapsed');}
function expandAll(){document.querySelectorAll('.day-block').forEach(b=>b.classList.remove('collapsed'));}
function collapseAll(){document.querySelectorAll('.day-block').forEach(b=>b.classList.add('collapsed'));}
function clearDone(){
  state.urgent=(state.urgent||[]).filter(i=>!i.done);
  state.canwait=(state.canwait||[]).filter(i=>!i.done);
  state.weeks.forEach(w=>w.days.forEach(d=>{d.items=d.items.filter(i=>!i.done);}));
  scheduleSave();render();showToast('Cleared done items');
}
function updateProgress(){
  let t=0,d=0;
  (state.urgent||[]).forEach(i=>{t++;if(i.done)d++;});
  (state.canwait||[]).forEach(i=>{t++;if(i.done)d++;});
  (state.weeks||[]).forEach(w=>w.days.forEach(dy=>dy.items.forEach(i=>{t++;if(i.done)d++;})));
  const fill=document.getElementById('progressFill');
  const lbl=document.getElementById('progressLabel');
  if(fill)fill.style.width=t?`${d/t*100}%`:'0%';
  if(lbl)lbl.textContent=`${d} / ${t}`;
}
function exportData(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='study-checklist.json';a.click();showToast('Exported!');}
function triggerImport(){document.getElementById('importFile').click();}
function importData(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{state=JSON.parse(ev.target.result);ensureIds();scheduleSave();render();showToast('Imported!');}catch{showToast('Invalid file',true);}};r.readAsText(file);e.target.value='';}

// ── TODAY PANEL ───────────────────────────────────────────────
let todayTasks=[];
function todayKey(){const d=new Date();return `today_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;}
function loadTodayTasks(){try{return JSON.parse(localStorage.getItem(todayKey())||'[]');}catch{return[];}}
function saveTodayTasks(t){localStorage.setItem(todayKey(),JSON.stringify(t));}
function renderToday(){
  const today=new Date();
  const lbl=document.getElementById('todayDateLabel');
  if(lbl)lbl.textContent=today.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const ul=document.getElementById('todayList');if(!ul)return;ul.innerHTML='';
  if(!todayTasks.length){ul.innerHTML='<div class="today-empty">Add something to focus on today</div>';return;}
  todayTasks.forEach((task,i)=>{
    const li=document.createElement('li');li.className='today-task'+(task.done?' done':'');
    li.innerHTML=`<div class="today-cb" onclick="toggleTodayTask(${i})">✓</div>
      <span class="today-task-name" contenteditable="false"
        ondblclick="startEditToday(this,${i})" onblur="endEditToday(this,${i})"
        onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
        >${escHtml(task.name)}</span>
      <button class="today-task-del" onclick="deleteTodayTask(${i})">×</button>`;
    ul.appendChild(li);
  });
}
function addTodayTask(){const input=document.getElementById('todayInput');const name=input.value.trim();if(!name){input.focus();return;}todayTasks.push({id:uid(),name,done:false});input.value='';saveTodayTasks(todayTasks);renderToday();}
function toggleTodayTask(i){todayTasks[i].done=!todayTasks[i].done;saveTodayTasks(todayTasks);renderToday();}
function deleteTodayTask(i){todayTasks.splice(i,1);saveTodayTasks(todayTasks);renderToday();}
function startEditToday(el,i){el.contentEditable='true';el.focus();const r=document.createRange();r.selectNodeContents(el);r.collapse(false);window.getSelection().removeAllRanges();window.getSelection().addRange(r);}
function endEditToday(el,i){el.contentEditable='false';const n=el.textContent.trim();if(n){todayTasks[i].name=n;saveTodayTasks(todayTasks);}else el.textContent=todayTasks[i].name;}

// ── DAILY HISTORY ─────────────────────────────────────────────
function getHistoryKeys(){
  return Object.keys(localStorage).filter(k=>k.startsWith('today_')).sort().reverse();
}
function renderHistory(){
  const list=document.getElementById('historyList');if(!list)return;list.innerHTML='';
  const keys=getHistoryKeys();
  if(!keys.length){list.innerHTML='<div class="history-empty">No history yet</div>';return;}
  keys.forEach(key=>{
    const tasks=JSON.parse(localStorage.getItem(key)||'[]');
    const done=tasks.filter(t=>t.done);
    const parts=key.replace('today_','').split('_');
    const dateObj=new Date(+parts[0],+parts[1],+parts[2]);
    const dateLabel=dateObj.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    const timerSecs=parseInt(localStorage.getItem(`timer_${parts[0]}_${parts[1]}_${parts[2]}`)||'0');
    const hoursLabel=timerSecs>0?fmtSecs(timerSecs):'';
    const day=document.createElement('div');day.className='history-day';
    day.innerHTML=`<div class="history-day-header" onclick="this.closest('.history-day').classList.toggle('open')">
      <span class="history-day-name">${dateLabel}</span>
      <div class="history-day-meta">
        ${hoursLabel?`<span class="history-day-hours">⏱ ${hoursLabel}</span>`:''}
        <span class="history-day-count">${done.length}/${tasks.length} done</span>
        <span class="history-day-toggle">▾</span>
      </div></div>
      <div class="history-tasks">${done.length?done.map(t=>`<div class="history-task-item">${escHtml(t.name)}</div>`).join(''):'<div style="font-size:11px;color:var(--text-dim);padding:4px 0">No completed tasks</div>'}</div>`;
    list.appendChild(day);
  });
}

// ── COUNTDOWNS ────────────────────────────────────────────────
let countdowns=[];
let selectedColor=CD_COLORS[0];
function loadCountdowns(){try{return JSON.parse(localStorage.getItem('study_countdowns')||'null')||[];}catch{return[];}}
function saveCountdowns(cd){localStorage.setItem('study_countdowns',JSON.stringify(cd));}
function renderCdColorPicker(){const row=document.getElementById('cdColorRow');if(!row)return;row.innerHTML='';CD_COLORS.forEach(c=>{const sw=document.createElement('div');sw.className='cd-color-swatch'+(c===selectedColor?' active':'');sw.style.background=c;sw.onclick=()=>{selectedColor=c;renderCdColorPicker();};row.appendChild(sw);});}
function renderCountdowns(){
  const list=document.getElementById('cdList');if(!list)return;list.innerHTML='';
  if(!countdowns.length){list.innerHTML='<div style="padding:10px 13px;font-size:11px;color:var(--text-dim);font-style:italic;text-align:center">No countdowns yet</div>';return;}
  const now=new Date();now.setHours(0,0,0,0);
  countdowns.forEach((cd,i)=>{
    const target=new Date(cd.date+'T00:00:00');
    const diff=Math.ceil((target-now)/(1000*60*60*24));
    const label=diff<0?`${Math.abs(diff)}d ago`:diff===0?'TODAY!':diff===1?'Tomorrow!':diff+'d left';
    const row=document.createElement('div');row.className='cd-item-row';
    row.innerHTML=`<div class="cd-item-dot" style="background:${cd.color}"></div>
      <div class="cd-item-info"><div class="cd-item-name">${escHtml(cd.name)}</div></div>
      <span class="cd-item-days" style="color:${diff<=3&&diff>=0?'var(--red)':diff<0?'var(--text-dim)':cd.color}">${label}</span>
      <button class="cd-item-del" onclick="deleteCountdown(${i})">×</button>`;
    list.appendChild(row);
  });
}
function toggleCdEditor(){const ed=document.getElementById('cdEditor'),btn=document.getElementById('cdEditBtn');ed.classList.toggle('open');btn.textContent=ed.classList.contains('open')?'✕ Close':'+ Add';if(ed.classList.contains('open'))renderCdColorPicker();}
function addCountdown(){const name=document.getElementById('cdName').value.trim(),date=document.getElementById('cdDate').value;if(!name||!date){showToast('Fill in name and date',true);return;}countdowns.push({id:uid(),name,date,color:selectedColor});saveCountdowns(countdowns);renderCountdowns();document.getElementById('cdName').value='';document.getElementById('cdDate').value='';toggleCdEditor();showToast('Countdown added!');}
function deleteCountdown(i){countdowns.splice(i,1);saveCountdowns(countdowns);renderCountdowns();}

// ── HELPERS ───────────────────────────────────────────────────
function showToast(msg,isErr=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(isErr?' err':'');clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),2400);}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── DARK MODE ─────────────────────────────────────────────────
function toggleDark(){
  const isDark=document.body.classList.toggle('dark');
  localStorage.setItem('study_theme',isDark?'dark':'light');
  const btn=document.getElementById('darkToggle');
  if(btn)btn.textContent=isDark?'☀️ Light':'🌙 Dark';
}
function initTheme(){
  const saved=localStorage.getItem('study_theme');
  if(saved==='dark'){
    document.body.classList.add('dark');
    const btn=document.getElementById('darkToggle');
    if(btn)btn.textContent='☀️ Light';
  }
}

// ── INIT ──────────────────────────────────────────────────────
document.addEventListener('click',()=>{
  document.querySelectorAll('.move-menu.open').forEach(m=>m.classList.remove('open'));
});

// Apply saved theme immediately (even before auth)
(()=>{const t=localStorage.getItem('study_theme');if(t==='dark')document.body.classList.add('dark');})();

// Check for saved session
(()=>{
  const saved=localStorage.getItem('study_session');
  if(saved){
    try{
      currentUser=JSON.parse(saved);
      showApp();
      return;
    }catch{}
  }
  document.getElementById('authScreen').style.display='flex';
})();
</script>
